[build]
  command = "npm run build"
  publish = "build"

[[redirects]]
  from = "/api/extension/auth/login"
  to = "/.netlify/functions/extension-auth-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/extension/programs"
  to = "/.netlify/functions/extension-programs"
  status = 200
  force = true

[[redirects]]
  from = "/api/extension/program-clients"
  to = "/.netlify/functions/extension-program-clients"
  status = 200
  force = true

[[redirects]]
  from = "/api/extension/agency-contact-settings"
  to = "/.netlify/functions/extension-agency-contact-settings"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
